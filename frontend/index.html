<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JEPKOM-ERP</title>
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
<!-- Sidebar: Barra lateral -->
    <aside class="sidebar">

<!-- Logo y nombre -->
    <div class="sidebar__brand">
        <span class="sidebar__brand-icon">⬡</span>
        <span class="sidebar__brand-name">ERP Sistema</span>
    </div>

<!-- Navegación -->
    <nav class="sidebar__nav">

<!-- Seccion comercial -->
        <div class="sidebar__section">
            <span class="sidebar__section-label">Comercial</span>
            <ul class="sidebar__list">
                <li class="sidebar__item">
                    <a href="#" class="sidebar__link" data-view="cotizacion">
                        <span class="sidebar__link-icon">◈</span>
                        <span class="sidebar__link-text">Cotización</span>
                    </a>
                </li>
            </ul>
        </div>

<!-- Seccion de operaciones -->
        <div class="sidebar__section">
            <span class="sidebar__section-label">Operaciones</span>
            <ul class="sidebar__list">

                <li class="sidebar__item">
                    <a href="#" class="sidebar__link" data-view="proyectos">
                        <span class="sidebar__link-icon">◇</span>
                        <span class="sidebar__link-text">Proyectos</span>
                    </a>
                </li>

                <li class="sidebar__item">
                    <a href="#" class="sidebar__link" data-view="orden-trabajo">
                        <span class="sidebar__link-icon">◇</span>
                        <span class="sidebar__link-text">Orden de trabajo</span>
                    </a>
                </li>

                <li class="sidebar__item">
                    <a href="#" class="sidebar__link" data-view="orden-interna">
                        <span class="sidebar__link-icon">◇</span>
                        <span class="sidebar__link-text">Orden interna</span>
                    </a>
                </li>

                <li class="sidebar__item">
                    <a href="#" class="sidebar__link" data-view="requerimientos">
                        <span class="sidebar__link-icon">◇</span>
                        <span class="sidebar__link-text">Requerimientos</span>
                    </a>
                </li>

                <li class="sidebar__item">
                    <a href="#" class="sidebar__link" data-view="rendiciones">
                        <span class="sidebar__link-icon">◇</span>
                        <span class="sidebar__link-text">Rendiciones</span>
                    </a>
                </li>

                <li class="sidebar__item">
                    <a href="#" class="sidebar__link" data-view="caja-chica">
                        <span class="sidebar__link-icon">◇</span>
                        <span class="sidebar__link-text">Caja chica</span>
                    </a>
                </li>

            </ul>
        </div>

    </nav>

<!-- Versión del sistema -->
        <div class="sidebar__footer">
            <span class="sidebar__footer-text">v1.0.0</span>
        </div>

    </aside>
<!--Fin Sidebar-->

<!-- Contenido principal:
Navbar principal y zona de contenido.
La navbar principal nunca cambia.
La zona de contenido es reemplazada por JS.
-->
    <div class="main-wrapper">

    <header class="navbar">

        <div class="navbar__actions">

            <!--Dropdown de base de datos-->
        <div class="navbar__db-selector">
            <button class="navbar__dropdown-btn">
                <i class="fa-solid fa-database"></i>
            </button>
            <ul class="navbar__dropdown-menu">
                <li><a href="#">Clientes</a></li>
                <li><a href="#">Contactos</a></li>
                <li><a href="#">Servicios</a></li>
                <li><a href="#">EPPs</a></li>
                <li><a href="#">Personal</a></li>
                <li><a href="#">Materiales</a></li>
                <li><a href="#">Herramientas</a></li>
                <li><a href="#">Ofertas</a></li>
            </ul>
        </div>
        
            <span class="navbar__user">Admin</span>
            <div class="navbar__avatar">A</div>
        </div>

    </header>

    <main class="content" id="content">
        <div class="form-group">
            <label class="form-label" for="nombre">Nombre</label>
            <input class="form-input" type="text" id="nombre" placeholder="Ingrese el nombre" />
        </div>
    </main>

    </div>
    <script src="js/dropdown.js"></script>
</body>
</html>
